<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: url("dentist.jpg")  center / cover;
            background-attachment: fixed;
            background-size: 120%;
        }

        h1{
            text-align: center;
        }

        #all{
            width: 80%;
            margin: auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        input{
            width: 100%;
            height: 40px;
            margin: 6px 0;
            padding-left: 5px;
            border: none;
            border-left: solid black 2px;
            transition-duration:0.5s ;
        }

        input:focus{
            outline: none;
            transform:scale(1.06);
        }

        #cost , #pay , #remain , #date{
            width: 21.5%;
        }

        .money{
            display: flex;
            justify-content: space-between;
        }


        /* Create and Delete Buttons */
        .mainBtns{
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        .mainBtns button{
            width: 48%;
            margin-bottom: 10px;
            height: 50px;
            font-size: large;
            border-radius: 30px;
            transition: 0.5s;
        }

        .mainBtns button:hover , #delAllBtn:hover{
            letter-spacing: 5px;
            background-color: #043d75;
            color: white;
        }

        .mainBtns button:focus , #delAllBtn:focus{
            letter-spacing: 5px;
            background-color: #043d75;
            color: white;
        }


        /* Search Section */
        .searchBtns{
            display: flex;
            justify-content: space-between;
        }

        .searchBtns button {
            width: 22%;
            height: 50px;
            margin-top: 10px;
            font-size: large;
            border-radius: 30px;
            transition: 0.5s;
        }

        .searchBtns button:hover{
            letter-spacing: 2px;
            background-color: #043d75;
            color: white;
        }

        .searchBtns button:focus{
            letter-spacing: 2px;
            background-color: #043d75;
            color: white;
        }


        /* Delete Button */
        #delAllBtn{
            width: 100%;
            margin-top: 15px;
            height: 50px;
            font-size: large;
            border-radius: 30px;
            transition: 0.5s;
        }


        /* Table */
        table{
            width: 100%;
            margin-top: 10px;
        }

        table th{
            text-transform: capitalize;
        }

        td{
            padding: 10px 0;
        }

        #btnUpdateTable , #btnDelTable{
            width: 80%;
            height: 40px;
            font-size: 15px;
            border-radius: 20px;
            transition: 0.5s;
        }

        #btnUpdateTable:hover , #btnDelTable:hover{
            background-color: #043d75;
            color: white;            
        }

        
    </style>
    <link rel="icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clinic Data</title>
</head>

<body>
    <h1>Dental Center</h1>
    <div id="all">
        <input placeholder="Patient's Name" title="Patient's Name" id="name" type="text">
        <input placeholder="Diagnosis" title="Diagnosis" id="diagnosis" type="text">
        <input placeholder="Treatment" title="Treatment" id="treatment" type="text">
        
        <div class="money">
            <input title="Date" id="date" type="date">
            <input placeholder="Cost" title="Cost" id="cost" type="number">
            <input placeholder="Pay" title="Pay" id="pay" type="number">
            <input placeholder="Remain" title="Remain" id="remain" type="number" readonly>
        </div>
        
        <div class="mainBtns">
            <button id="btnCreate">Create</button>
            <button id="btnDelete" onclick="playSound() , clearalldata()">Delete</button>
        </div>
        
        <div class="search">
            <input id="search" placeholder="Search By Name" type="search">
            <div class="searchBtns">
                <button id="btnName">Search By Name</button>
                <button id="btnDiagnosis">Search By Diagnosis</button>
                <button id="btnTreatment">Search By Treatment</button>
                <button id="btnDate">Search By Date</button>
            </div>
        </div>

        <div id="deleteAll"></div>

        <table>
            <tr>
                <th>iD</th>
                <th>patient's Name</th>
                <th>diagnosis</th>
                <th>treatment</th>
                <th>date</th>
                <th>cost</th>
                <th>pay</th>
                <th>remain</th>
                <th>update</th>
                <th>delete</th>
            </tr>

            <tbody id="tbody">

            </tbody>
        </table>
    </div>

    <!-- JavaScript Codes -->
    <script>
        // Decalation of all Variables
        let name = document.getElementById("name");
        let diagnosis = document.getElementById("diagnosis");
        let treatment = document.getElementById("treatment");
        let date = document.getElementById("date");
        let cost = document.getElementById("cost");
        let pay = document.getElementById("pay");
        let remain = document.getElementById("remain");
        let btnCreate = document.getElementById("btnCreate");
        let btnDelete = document.getElementById("btnDelete");
        let deleteAll = document.getElementById("deleteAll");
        let btnDelTable = document.getElementById("btnDelTable");
        //      Search Variables 
        let searchMood = "name";
        let search = document.getElementById("search");
        let btnName = document.getElementById("btnName");
        let btnDiagnosis = document.getElementById("btnDiagnosis");
        let btnTreatment = document.getElementById("btnTreatment");
        let btnDate = document.getElementById("btnDate");
        let tmp;
        let mood = "create";

        // Sounds
        const addSound = new Audio("click.mp3");
        function playSound(){
            addSound.play()
        }

        const addWrongSound = new Audio("Wrong.mp3");
        function playWrongSound(){
            addWrongSound.play()
        }


        // Create Button
        //       Get Data from LoaclStorage
        let allData = JSON.parse(localStorage.getItem("clinicData")) || [];
        btnCreate.onclick = function(){
            playSound()

            if(name.value.trim()===""){
                playWrongSound()
                alert("Name is required ❌");
                name.focus();
                return;
            }

            let oneRecord = {
                name : name.value.toLowerCase(),
                diagnosis : diagnosis.value.toLowerCase(),
                treatment : treatment.value.toLowerCase(),
                date : date.value,
                cost : cost.value,
                pay : pay.value,
                remain : remain.value
            }
            
            if(mood === "create"){
                allData.push(oneRecord);
            }else{
                allData[tmp] = oneRecord;
                mood ="create";
                btnCreate.innerHTML = "Create";
            }

            //      Save Data to localStorage
            localStorage.setItem("clinicData", JSON.stringify(allData));
            showdata()
            clearalldata()
        }


        // Show Data in the table 
        function showdata(){
            let table = "";
            for(let i = 0 ; i<allData.length ; i++){
                table+=
                `
                    <tr>
                        <td>${i+1}</td>
                        <td>${allData[i].name}</td>
                        <td>${allData[i].diagnosis}</td>
                        <td>${allData[i].treatment}</td>
                        <td>${allData[i].date}</td>
                        <td>${allData[i].cost}</td>
                        <td>${allData[i].pay}</td>
                        <td>${allData[i].remain}</td>
                        <td><button id="btnUpdateTable" onclick="updateData(${i})">Update</button></td>
                        <td><button id="btnDelTable" onclick="btnDelTablef(${i})">Delete</button></td> 
                    </tr>
                
                `
            }

            document.getElementById("tbody").innerHTML = table;
            //      Delete All Button
            if(allData.length > 0 ){
                deleteAll.innerHTML = `
                <button id= "delAllBtn" onclick="delAll()">Delete All Records(${allData.length})</button>
                `
            }else{
                deleteAll.innerHTML = "";
            }
        }
        showdata()


        // Delte Inputs Items
        function clearalldata(){
            name.value = "";
            diagnosis.value = "";
            treatment.value = "";
            date.value = "";
            cost.value = "";
            pay.value = "";
            remain.value = "";
        }

        //  Delete one Record ( Delete Button in the Table )
        function btnDelTablef(i){
            playSound();
            allData.splice(i,1);
            localStorage.setItem("clinicData", JSON.stringify(allData));
            showdata();
        }

        // Update one Record
        function updateData(i){
            playSound();
            name.value = allData[i].name;
            diagnosis.value = allData[i].diagnosis;
            treatment.value = allData[i].treatment;
            date.value = allData[i].date;
            cost.value = allData[i].cost;
            pay.value = allData[i].pay;
            remain.value = allData[i].remain;
            tmp = i;
            mood = "update"
            btnCreate.innerHTML = "Up Date"
            scroll({
                top:0,
                behavior:"smooth"
            })
        }

        // Delete all Records Functions
        function delAll(){
            let isConfirm = confirm("Do you really want to delete all data?");
            if(isConfirm){
            playSound();
            localStorage.removeItem("clinicData");
            allData.splice(0);
            showdata();
            }
        }

        // Get Total
        function getTotal(){
            let result = +cost.value - +pay.value
            remain.value = result;
        }
        cost.oninput = getTotal;
        pay.oninput = getTotal;

        // Search Section 
        btnName.onclick = function(){
            playSound()
            searchMood = "name";
            search.placeholder = "Search By Name";
            search.focus();
        }

        btnDiagnosis.onclick = function(){
            playSound()
            searchMood = "diagnosis";
            search.placeholder = "Search By Diagnosis";
            search.focus();
        }

        btnTreatment.onclick = function(){
            playSound()
            searchMood = "treatment";
            search.placeholder = "Search By Treatment";
            search.focus();
        }

        btnDate.onclick = function(){
            playSound()
            searchMood = "date";
            search.placeholder = "Search By Date";
            search.focus();
        }

        function searchData(value){
        let table = "";

        for(let i = 0; i < allData.length; i++){
            if(
                (searchMood === "name" && allData[i].name.includes(value)) ||
                (searchMood === "diagnosis" && allData[i].diagnosis.includes(value)) ||
                (searchMood === "treatment" && allData[i].treatment.includes(value)) ||
                (searchMood === "date" && allData[i].date.includes(value))
            ){
                table += `
                    <tr>
                        <td>${i+1}</td>
                        <td>${allData[i].name}</td>
                        <td>${allData[i].diagnosis}</td>
                        <td>${allData[i].treatment}</td>
                        <td>${allData[i].date}</td>
                        <td>${allData[i].cost}</td>
                        <td>${allData[i].pay}</td>
                        <td>${allData[i].remain}</td>
                        <td><button id="btnUpdateTable" onclick="updateData(${i}")>Update</button></td>
                        <td><button id="btnDelTable" onclick="btnDelTablef(${i})">Delete</button></td>
                    </tr>
                `;
            }
        }

        document.getElementById("tbody").innerHTML = table;
        }
        search.onkeyup = function(){
        searchData(this.value.toLowerCase());
        }
    </script>
</body>
</html>
