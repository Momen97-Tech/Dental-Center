<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="icon" href="icon.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: url("dentist.jpg") center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login {
            width: 100%;
            max-width: 380px;
            padding: 40px 32px 36px;
            text-align: center;
            border: 1.5px solid rgba(255,255,255,0.45);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .login h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input[type="text"],
        .input-group input[type="password"] {
            width: 100%;
            height: 44px;
            padding: 0 14px 0 14px;
            border: none;
            border-left: 3px solid #043d75;
            border-radius: 4px;
            background: rgba(255,255,255,0.85);
            font-size: 1rem;
            color: #222;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .input-group input[type="text"]:focus,
        .input-group input[type="password"]:focus {
            outline: none;
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(4,61,117,0.25);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-row input {
            flex: 1;
            height: 44px;
            border: 1.5px solid rgba(255,255,255,0.6);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.15);
            color: #fff;
            transition: background 0.4s, color 0.4s, letter-spacing 0.3s;
        }

        .btn-row input:hover,
        .btn-row input:focus {
            background: #043d75;
            color: #fff;
            letter-spacing: 2px;
            outline: none;
        }

        /* Tablet */
        @media (max-width: 600px) {
            .login {
                padding: 32px 20px 28px;
            }
        }

        /* Small phones */
        @media (max-width: 360px) {
            .login {
                padding: 24px 14px 22px;
            }

            .login h1 {
                font-size: 1.3rem;
            }

            .btn-row input {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="login">
        <h1>Sign in</h1>
        <form onsubmit="return false;">
            <div class="input-group">
                <input placeholder="User Name" title="User Name" id="uname" type="text" value="doctor" autocomplete="username">
            </div>
            <div class="input-group">
                <input placeholder="Password" title="Password" id="password" type="password" value="2020" autocomplete="current-password">
            </div>
            <div class="btn-row">
                <input onclick="sign()" class="enter" type="button" value="Login">
                <input onclick="playSound()" class="delete" type="reset" value="Delete">
            </div>
        </form>
    </div>

    <script>
        let uname = document.getElementById("uname");
        let password = document.getElementById("password");

        const addSound = new Audio("click.mp3");
        function playSound() { addSound.play(); }

        const addWrongSound = new Audio("Wrong.mp3");
        function playWrongSound() { addWrongSound.play(); }

        function sign() {
            playSound();
            if (uname.value.toLowerCase() === "doctor" && password.value === "2020") {
                window.location.href = "data.html";
            } else {
                playWrongSound();
                alert("There is Wrong or Empty Value! ❌");
            }
        }

        // Allow Enter key
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") sign();
        });
    </script>
</body>
</html>
